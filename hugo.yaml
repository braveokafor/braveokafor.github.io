        content: >
          Authorisation interceptor library for ConnectRPC in Go. Supports
          custom authorisation logic and policy-based authorisation via Casbin,
          covering unary and streaming RPCs across Connect, gRPC, and gRPC-Web
          protocols.
        image: https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/grpc/grpc-original.svg
